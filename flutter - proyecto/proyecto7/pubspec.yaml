name: proyecto7
description: "A new Flutter project."

publish_to: 'none' 


environment:
  sdk: ^3.11.1


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  

flutter:


  uses-material-design: true

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/img/icons/icon_app.png"
  adaptative_icon_background: "#ffffff"
  adaptative_icon_foreground: "assets/img/icons/icon_app.png"
  remove_alpha_ios: true
  min_sdk_android: 21